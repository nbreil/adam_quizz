<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Europe — Adam</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --navy:#060b18; --navy-dark:#0a1020; --navy-card:#0d1830;
      --navy-border:#1e2d4a; --navy-hover:#162440;
      --gold:#c9a84c; --gold-light:#e2c46e; --gold-dim:#7a6128;
      --green:#2ecc8a; --green-dark:#1a5c38;
      --red:#e05555;   --red-dark:#7a1515;
      --text:#ddd8cc; --text-bright:#f0ead8; --text-muted:#5a7099; --text-soft:#8899bb;
      --ocean:#071022;
      --mono:'IBM Plex Mono',monospace;
      --sans:'IBM Plex Sans',sans-serif;
      --serif:'Playfair Display',Georgia,serif;
    }
    body{font-family:var(--sans);background:var(--navy);color:var(--text);min-height:100vh;}

    /* Nav */
    nav{display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:52px;border-bottom:1px solid var(--navy-border);background:var(--navy-dark);position:sticky;top:0;z-index:100;}
    .nav-logo{font-family:var(--serif);font-size:18px;font-weight:700;color:var(--gold-light);text-decoration:none;letter-spacing:.06em;}
    .nav-logo span{font-family:var(--mono);font-size:10px;color:var(--text-muted);letter-spacing:.14em;margin-left:8px;vertical-align:middle;}
    .back-btn{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-soft);text-decoration:none;border:1px solid var(--navy-border);padding:6px 14px;transition:border-color .2s,color .2s;}
    .back-btn:hover{border-color:var(--gold);color:var(--gold);}

    /* Shell */
    .shell{max-width:820px;margin:0 auto;padding:2rem 1.5rem 5rem;}

    /* Header */
    header{margin-bottom:1.4rem;}
    .header-eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-dim);margin-bottom:8px;}
    header h1{font-family:var(--serif);font-size:32px;font-weight:900;color:var(--text-bright);}
    header h1 em{font-style:italic;color:var(--gold-light);}
    .header-sub{font-family:var(--mono);font-size:11px;color:var(--text-muted);letter-spacing:.06em;margin-top:4px;}

    /* Progress */
    .progress-row{display:flex;align-items:center;gap:12px;margin-bottom:.8rem;}
    .progress-label{font-family:var(--mono);font-size:11px;color:var(--text-muted);white-space:nowrap;letter-spacing:.06em;}
    .progress-bar-wrap{flex:1;background:var(--navy-card);border:1px solid var(--navy-border);height:4px;}
    .progress-bar{height:100%;background:linear-gradient(to right,var(--gold-dim),var(--gold));transition:width .4s ease;}
    .score-label{font-family:var(--mono);font-size:11px;color:var(--gold);white-space:nowrap;letter-spacing:.06em;}

    /* Quiz card */
    .quiz-card{background:var(--navy-card);border:1px solid var(--navy-border);padding:1.2rem 1.6rem;margin-bottom:.8rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;border-left:3px solid var(--gold);}
    .question-text{font-family:var(--serif);font-size:20px;font-weight:700;color:var(--text-bright);}
    .question-text strong{color:var(--gold-light);font-style:italic;}
    .hearts-row{display:flex;align-items:center;gap:6px;}
    .heart{font-size:18px;transition:transform .25s,filter .25s,opacity .25s;font-family:var(--mono);}
    .heart.lost{filter:grayscale(1);opacity:.25;transform:scale(.8);}

    /* Feedback */
    .feedback-bar{background:var(--navy-card);border:1px solid var(--navy-border);padding:.55rem 1.4rem;margin-bottom:.8rem;font-family:var(--mono);font-size:12px;letter-spacing:.04em;color:var(--text-soft);text-align:center;min-height:40px;display:flex;align-items:center;justify-content:center;transition:background .25s,border-color .25s;}
    .feedback-bar.wrong-fb  {background:rgba(224,85,85,.1);border-color:var(--red);color:var(--red);}
    .feedback-bar.correct-fb{background:rgba(46,204,138,.1);border-color:var(--green);color:var(--green);}
    .feedback-bar.skip-fb   {background:rgba(201,168,76,.08);border-color:var(--gold-dim);color:var(--gold);}

    /* Map */
    #map-wrap{background:var(--navy-dark);border:1px solid var(--navy-border);}
    #map-wrap svg{width:100%;height:auto;display:block;}
    .region{fill:#162235;stroke:#2a3d5a;stroke-width:.5px;cursor:pointer;transition:fill .15s;}
    .region:hover:not(.wrong):not(.correct):not(.revealed):not(.done){fill:#1e3050;}
    .region.wrong   {fill:var(--red-dark);stroke:var(--red);}
    .region.correct {fill:var(--green-dark);stroke:var(--green);animation:correctPulse .45s ease-out;}
    .region.revealed{fill:#1a4030;stroke:var(--green);}
    .region.done    {fill:#182a20;stroke:#2a4a35;cursor:default;}
    @keyframes correctPulse{0%{fill:#0d2a1a}50%{fill:#1e7040}100%{fill:var(--green-dark)}}
    .region-label{font-family:var(--mono);font-size:7px;font-weight:500;pointer-events:none;text-anchor:middle;dominant-baseline:middle;letter-spacing:.03em;}

    /* Overlay */
    .overlay{display:none;position:fixed;inset:0;background:rgba(6,11,24,.92);backdrop-filter:blur(8px);z-index:300;align-items:center;justify-content:center;}
    .overlay.visible{display:flex;}
    .result-box{background:var(--navy-card);border:1px solid var(--navy-border);border-top:3px solid var(--gold);padding:2.5rem 3rem;text-align:center;max-width:420px;width:90%;animation:slideUp .3s ease-out;}
    @keyframes slideUp{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}
    .result-emoji{font-size:52px;margin-bottom:.8rem;}
    .result-title{font-family:var(--serif);font-size:26px;font-weight:700;color:var(--gold-light);margin-bottom:.4rem;}
    .result-score{font-family:var(--mono);font-size:44px;font-weight:400;color:var(--text-bright);margin:.6rem 0;letter-spacing:.04em;}
    .result-sub{font-family:var(--mono);font-size:11px;color:var(--text-muted);letter-spacing:.06em;margin-bottom:1.6rem;}
    .replay-btn{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--navy);background:var(--gold);border:none;padding:11px 28px;cursor:pointer;transition:background .2s,transform .15s;}
    .replay-btn:hover{background:var(--gold-light);transform:translateY(-1px);}
    .result-detail{text-align:left;font-family:var(--mono);font-size:11px;margin:.8rem 0 1.2rem;max-height:150px;overflow-y:auto;border:1px solid var(--navy-border);padding:.5rem .8rem;background:var(--navy-dark);color:var(--text-soft);}
    .rdi{padding:2px 0;}
    .rdi.ok  {color:var(--green);}
    .rdi.miss{color:var(--red);}
    .result-btns{display:flex;gap:10px;justify-content:center;}
  </style>
</head>

      const id=nid(d.id);
      const el=d3.select("#r-"+id);
      if(el.classed("correct")||el.classed("done")||el.classed("revealed"))return;
      const name=NAMES[id]||d.properties?.name||"?";
      if(id===currentTarget()){
        el.classed("correct",true);
        addLabel(id,name,"#2ecc8a");
        qResults.push({name,found:true,tries:wrongsThisQ+1});
        score++;locked=true;
        setFeedback("correct","✓ "+name);
        setTimeout(nextQuestion,1200);
      } else {
        if(el.classed("wrong"))return;
        el.classed("wrong",true);
        addLabel(id,name,"#e05555");
        triesLeft--;wrongsThisQ++;loseHeart();
        setFeedback("wrong","✗ Ici : "+name);
        if(triesLeft<=0){
          locked=true;
          const tid=currentTarget();const tname=NAMES[tid];
          qResults.push({name:tname,found:false,tries:3});
          d3.select("#r-"+tid).classed("revealed",true);
          addLabel(tid,tname+" ✓","#2ecc8a");
          setFeedback("skip","→ "+tname);
          setTimeout(nextQuestion,2000);
        }
      }
    }
    function addLabel(id,text,color){
      const feat=featureMap[id];if(!feat)return;
      const[cx,cy]=pathGen.centroid(feat);
      if(!isFinite(cx)||!isFinite(cy))return;
      labelsG.append("text").attr("class","region-label").attr("x",cx).attr("y",cy).attr("fill",color).text(text);
    }
    function nextQuestion(){
      labelsG.selectAll("*").remove();
      d3.select("#r-"+currentTarget()).classed("correct",false).classed("revealed",false).classed("done",true);
      qIndex++;
      if(qIndex>=queue.length)finishGame();else loadQuestion();
    }
    function finishGame(){
      document.getElementById("progress-bar").style.width="100%";
      document.getElementById("progress-label").textContent="Terminé";
      document.getElementById("score-label").textContent="✓ "+score;
      const entry={date:new Date().toLocaleDateString("fr-FR"),results:qResults,score,total:queue.length};
      const key="scores_"+QUIZ_ID;
      const hist=JSON.parse(localStorage.getItem(key)||"[]");
      hist.unshift(entry);if(hist.length>20)hist.pop();
      localStorage.setItem(key,JSON.stringify(hist));
      const pct=score/queue.length;
      const emoji=pct===1?"◆◆◆":pct>=.7?"◆◆":"◆";
      const sub=pct===1?"Perfect score — flawless execution.":pct>=.7?"Strong performance.":pct>=.4?"Room to improve.":"Keep grinding.";
      document.getElementById("res-emoji").textContent=emoji;
      document.getElementById("res-score").textContent=score+" / "+queue.length;
      document.getElementById("res-sub").textContent=sub;
      document.getElementById("res-detail").innerHTML=qResults.map(r=>{
        const label=r.found?(r.tries===1?" · 1st try":" · "+r.tries+" tries"):" · missed";
        return "<div class=\"rdi "+(r.found?"ok":"miss")+"\">"+(r.found?"✓":"✗")+" "+r.name+label+"</div>";
      }).join("");
      downloadTxt(entry);
      document.getElementById("overlay").classList.add("visible");
    }
    function downloadTxt(entry){
      const lines=["Quiz — "+QUIZ_TITLE,"Date: "+entry.date,"Score: "+entry.score+" / "+entry.total,"","Detail:"];
      entry.results.forEach(r=>{
        lines.push("  "+r.name+" : "+(r.found?(r.tries===1?"✓ 1st try":"✓ "+r.tries+" tries"):"✗ missed"));
      });
      const hist=JSON.parse(localStorage.getItem("scores_"+QUIZ_ID)||"[]");
      if(hist.length>1){lines.push("","--- History ---");hist.slice(1).forEach(h=>lines.push("  "+h.date+" : "+h.score+"/"+h.total));}
      const blob=new Blob([lines.join("\n")],{type:"text/plain;charset=utf-8"});
      const a=document.createElement("a");a.href=URL.createObjectURL(blob);
      a.download="score_"+QUIZ_ID+"_"+entry.date.replace(/\//g,"-")+".txt";
      document.body.appendChild(a);a.click();document.body.removeChild(a);
    }
    initGame();
  </script>
</body>
