<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Amérique du Sud — Adam</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --navy:#060b18; --navy-dark:#0a1020; --navy-card:#0d1830;
      --navy-border:#1e2d4a; --navy-hover:#162440;
      --gold:#c9a84c; --gold-light:#e2c46e; --gold-dim:#7a6128;
      --green:#2ecc8a; --green-dark:#1a5c38;
      --red:#e05555;   --red-dark:#7a1515;
      --text:#ddd8cc; --text-bright:#f0ead8; --text-muted:#5a7099; --text-soft:#8899bb;
      --ocean:#071022;
      --mono:'IBM Plex Mono',monospace;
      --sans:'IBM Plex Sans',sans-serif;
      --serif:'Playfair Display',Georgia,serif;
    }
    body{font-family:var(--sans);background:var(--navy);color:var(--text);min-height:100vh;}

    /* Nav */
    nav{display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:52px;border-bottom:1px solid var(--navy-border);background:var(--navy-dark);position:sticky;top:0;z-index:100;}
    .nav-logo{font-family:var(--serif);font-size:18px;font-weight:700;color:var(--gold-light);text-decoration:none;letter-spacing:.06em;}
    .nav-logo span{font-family:var(--mono);font-size:10px;color:var(--text-muted);letter-spacing:.14em;margin-left:8px;vertical-align:middle;}
    .back-btn{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-soft);text-decoration:none;border:1px solid var(--navy-border);padding:6px 14px;transition:border-color .2s,color .2s;}
    .back-btn:hover{border-color:var(--gold);color:var(--gold);}

    /* Shell */
    .shell{max-width:820px;margin:0 auto;padding:2rem 1.5rem 5rem;}

    /* Header */
    header{margin-bottom:1.4rem;}
    .header-eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-dim);margin-bottom:8px;}
    header h1{font-family:var(--serif);font-size:32px;font-weight:900;color:var(--text-bright);}
    header h1 em{font-style:italic;color:var(--gold-light);}
    .header-sub{font-family:var(--mono);font-size:11px;color:var(--text-muted);letter-spacing:.06em;margin-top:4px;}

    /* Progress */
    .progress-row{display:flex;align-items:center;gap:12px;margin-bottom:.8rem;}
    .progress-label{font-family:var(--mono);font-size:11px;color:var(--text-muted);white-space:nowrap;letter-spacing:.06em;}
    .progress-bar-wrap{flex:1;background:var(--navy-card);border:1px solid var(--navy-border);height:4px;}
    .progress-bar{height:100%;background:linear-gradient(to right,var(--gold-dim),var(--gold));transition:width .4s ease;}
    .score-label{font-family:var(--mono);font-size:11px;color:var(--gold);white-space:nowrap;letter-spacing:.06em;}

    /* Quiz card */
    .quiz-card{background:var(--navy-card);border:1px solid var(--navy-border);padding:1.2rem 1.6rem;margin-bottom:.8rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;border-left:3px solid var(--gold);}
    .question-text{font-family:var(--serif);font-size:20px;font-weight:700;color:var(--text-bright);}
    .question-text strong{color:var(--gold-light);font-style:italic;}
    .hearts-row{display:flex;align-items:center;gap:6px;}
    .heart{font-size:18px;transition:transform .25s,filter .25s,opacity .25s;font-family:var(--mono);}
    .heart.lost{filter:grayscale(1);opacity:.25;transform:scale(.8);}

    /* Feedback */
    .feedback-bar{background:var(--navy-card);border:1px solid var(--navy-border);padding:.55rem 1.4rem;margin-bottom:.8rem;font-family:var(--mono);font-size:12px;letter-spacing:.04em;color:var(--text-soft);text-align:center;min-height:40px;display:flex;align-items:center;justify-content:center;transition:background .25s,border-color .25s;}
    .feedback-bar.wrong-fb  {background:rgba(224,85,85,.1);border-color:var(--red);color:var(--red);}
    .feedback-bar.correct-fb{background:rgba(46,204,138,.1);border-color:var(--green);color:var(--green);}
    .feedback-bar.skip-fb   {background:rgba(201,168,76,.08);border-color:var(--gold-dim);color:var(--gold);}

    /* Map */
    #map-wrap{background:var(--navy-dark);border:1px solid var(--navy-border);}
    #map-wrap svg{width:100%;height:auto;display:block;}
    .region{fill:#162235;stroke:#2a3d5a;stroke-width:.5px;cursor:pointer;transition:fill .15s;}
    .region:hover:not(.wrong):not(.correct):not(.revealed):not(.done){fill:#1e3050;}
    .region.wrong   {fill:var(--red-dark);stroke:var(--red);}
    .region.correct {fill:var(--green-dark);stroke:var(--green);animation:correctPulse .45s ease-out;}
    .region.revealed{fill:#1a4030;stroke:var(--green);}
    .region.done    {fill:#182a20;stroke:#2a4a35;cursor:default;}
    @keyframes correctPulse{0%{fill:#0d2a1a}50%{fill:#1e7040}100%{fill:var(--green-dark)}}
    .region-label{font-family:var(--mono);font-size:7px;font-weight:500;pointer-events:none;text-anchor:middle;dominant-baseline:middle;letter-spacing:.03em;}

    /* Overlay */
    .overlay{display:none;position:fixed;inset:0;background:rgba(6,11,24,.92);backdrop-filter:blur(8px);z-index:300;align-items:center;justify-content:center;}
    .overlay.visible{display:flex;}
    .result-box{background:var(--navy-card);border:1px solid var(--navy-border);border-top:3px solid var(--gold);padding:2.5rem 3rem;text-align:center;max-width:420px;width:90%;animation:slideUp .3s ease-out;}
    @keyframes slideUp{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}
    .result-emoji{font-size:52px;margin-bottom:.8rem;}
    .result-title{font-family:var(--serif);font-size:26px;font-weight:700;color:var(--gold-light);margin-bottom:.4rem;}
    .result-score{font-family:var(--mono);font-size:44px;font-weight:400;color:var(--text-bright);margin:.6rem 0;letter-spacing:.04em;}
    .result-sub{font-family:var(--mono);font-size:11px;color:var(--text-muted);letter-spacing:.06em;margin-bottom:1.6rem;}
    .replay-btn{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--navy);background:var(--gold);border:none;padding:11px 28px;cursor:pointer;transition:background .2s,transform .15s;}
    .replay-btn:hover{background:var(--gold-light);transform:translateY(-1px);}
    .result-detail{text-align:left;font-family:var(--mono);font-size:11px;margin:.8rem 0 1.2rem;max-height:150px;overflow-y:auto;border:1px solid var(--navy-border);padding:.5rem .8rem;background:var(--navy-dark);color:var(--text-soft);}
    .rdi{padding:2px 0;}
    .rdi.ok  {color:var(--green);}
    .rdi.miss{color:var(--red);}
    .result-btns{display:flex;gap:10px;justify-content:center;}
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="../index.html">ADAM <span>/ PRIVATE</span></a>
    <a class="back-btn" href="../quizzes.html">← Quizzes</a>
  </nav>

  <div class="overlay" id="overlay">
    <div class="result-box">
      <div class="result-emoji" id="res-emoji">◆</div>
      <div class="result-title" id="res-title">Score final</div>
      <div class="result-score" id="res-score">0 / 10</div>
      <div class="result-sub"   id="res-sub"></div>
      <div class="result-detail" id="res-detail"></div>
      <div class="result-btns">
        <button class="replay-btn" onclick="location.reload()">↺ Rejouer</button>
      </div>
    </div>
  </div>

  <div class="shell">
    <header>
      <div class="header-eyebrow">Géographie · Quiz</div>
      <h1><em>Amérique du Sud</em></h1>
      <div class="header-sub">Pays · 10 par partie</div>
    </header>

    <div class="progress-row">
      <span class="progress-label" id="progress-label">Pays 1 / 10</span>
      <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>
      <span class="score-label" id="score-label">✓ 0</span>
    </div>

    <div class="quiz-card">
      <div class="question-text" id="question-text">Où se trouve … ?</div>
      <div class="hearts-row" id="hearts-row">
        <span class="heart" id="h1">◆</span>
        <span class="heart" id="h2">◆</span>
        <span class="heart" id="h3">◆</span>
      </div>
    </div>

    <div class="feedback-bar" id="feedback">— Clique sur le bon pays —</div>
    <div id="map-wrap"></div>
  </div>

  <script>
    const NAMES = {"32":"Argentine","68":"Bolivie","76":"Brésil","152":"Chili","170":"Colombie","218":"Équateur","238":"Îles Malouines","328":"Guyana","600":"Paraguay","604":"Pérou","740":"Suriname","858":"Uruguay","862":"Venezuela"};
    const QUIZ_ID = "adam_amersud", QUIZ_TITLE = "Amérique du Sud";
    const MAX_TRIES=3, TOTAL=10;
    let queue=[],qIndex=0,triesLeft=MAX_TRIES,score=0,locked=false;
    let qResults=[],wrongsThisQ=0;

    function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a;}
    function currentTarget(){return queue[qIndex];}
    function nid(id){return String(parseInt(id,10));}

    function setFeedback(type,msg){const el=document.getElementById("feedback");el.className="feedback-bar"+(type?" "+type+"-fb":"");el.textContent=msg;}
    function resetHearts(){for(let i=1;i<=MAX_TRIES;i++)document.getElementById("h"+i).classList.remove("lost");}
    function loseHeart(){const idx=MAX_TRIES-triesLeft;document.getElementById("h"+idx)?.classList.add("lost");}
    function updateProgress(){
      document.getElementById("progress-label").textContent="Pays "+(qIndex+1)+" / "+TOTAL;
      document.getElementById("progress-bar").style.width=(qIndex/TOTAL*100)+"%";
      document.getElementById("score-label").textContent="✓ "+score;
    }
    function setQuestion(name){document.getElementById("question-text").innerHTML="Où se trouve <strong>"+name+"</strong> ?";}

    const W=820,H=700;
    const svg=d3.select("#map-wrap").append("svg").attr("viewBox","0 0 "+W+" "+H).attr("preserveAspectRatio","xMidYMid meet");
    svg.append("rect").attr("width",W).attr("height",H).attr("fill","#071022");
    const g=svg.append("g");
    const labelsG=svg.append("g");
    const projection=d3.geoMercator().center([-58,-15]).scale(420).translate([W/2,H/2]);
    const pathGen=d3.geoPath().projection(projection);

    const GEO_DATA={"type":"Topology","transform":{"scale":[0.0036000360003600037,0.0016925586033320105],"translate":[-180,-85.60903777459771]},"objects":{"countries":{"type":"GeometryCollection","geometries":[{"type":"MultiPolygon","arcs":[[[0,1]],[[2,3,4,5,6,7]]],"id":"032","properties":{"name":"Argentina"}},{"type":"MultiPolygon","arcs":[[[-2,8]],[[9,-5,10,11]]],"id":"152","properties":{"name":"Chile"}},{"type":"Polygon","arcs":[[12]],"id":"238","properties":{"name":"Falkland Is."}},{"type":"Polygon","arcs":[[13,14,-3]],"id":"858","properties":{"name":"Uruguay"}},{"type":"Polygon","arcs":[[-14,-8,15,16,17,18,19,20,21,22,23]],"id":"076","properties":{"name":"Brazil"}},{"type":"Polygon","arcs":[[-17,24,-6,-10,25]],"id":"068","properties":{"name":"Bolivia"}},{"type":"Polygon","arcs":[[-18,-26,-12,26,27,28]],"id":"604","properties":{"name":"Peru"}},{"type":"Polygon","arcs":[[-19,-29,29,30,31,32,33]],"id":"170","properties":{"name":"Colombia"}},{"type":"Polygon","arcs":[[-20,-34,34,35]],"id":"862","properties":{"name":"Venezuela"}},{"type":"Polygon","arcs":[[-21,-36,36,37]],"id":"328","properties":{"name":"Guyana"}},{"type":"Polygon","arcs":[[-22,-38,38,39]],"id":"740","properties":{"name":"Suriname"}},{"type":"Polygon","arcs":[[-28,40,-30]],"id":"218","properties":{"name":"Ecuador"}},{"type":"Polygon","arcs":[[-16,-7,-25]],"id":"600","properties":{"name":"Paraguay"}}]}},"arcs":[[[30935,19481],[106,-274],[139,-443],[361,-355],[389,-147],[-125,-296],[-264,-29],[-141,208]],[[31400,18145],[-168,16],[-297,1],[0,1319]],[[33993,32727],[-70,-473],[-74,-607],[3,-588],[-61,-132],[-21,-382]],[[33770,30545],[-19,-308],[353,-506],[-38,-408],[173,-257],[-14,-289],[-267,-757],[-412,-317],[-557,-123],[-305,59],[59,-352],[-57,-442],[51,-298],[-167,-208],[-284,-82],[-267,216],[-108,-155],[39,-587],[188,-178],[152,186],[82,-307],[-255,-183],[-223,-367],[-41,-595],[-66,-316],[-262,-2],[-218,-302],[-80,-443],[273,-433],[266,-119],[-96,-531],[-328,-333],[-180,-692],[-254,-234],[-113,-276],[89,-614],[185,-342],[-117,30]],[[30952,19680],[-257,93],[-672,79],[-115,344],[6,443],[-185,-38],[-98,214],[-24,626],[213,260],[88,375],[-33,299],[148,504],[101,782],[-30,347],[122,112],[-30,223],[-129,118],[92,248],[-126,224],[-65,682],[112,120],[-47,720],[65,605],[75,527],[166,215],[-84,576],[-1,543],[210,386],[-7,494],[159,576],[1,544],[-72,108],[-128,1020],[171,607],[-27,572],[100,537],[182,555],[196,367],[-83,232],[58,190],[-9,985],[302,291],[96,614],[-34,148]],[[31359,37147],[231,534],[364,-144],[163,-427],[109,475],[316,-24],[45,-127]],[[32587,37434],[511,-964],[227,-89],[339,-437],[286,-231],[40,-261],[-273,-898],[280,-160],[312,-91],[220,95],[252,453],[45,521]],[[34826,35372],[138,114],[139,-341],[-6,-472],[-234,-326],[-186,-241],[-314,-573],[-370,-806]],[[31400,18145],[-92,-239],[-238,-183],[-137,19],[-164,48],[-202,177],[-291,86],[-350,330],[-283,317],[-383,662],[229,-124],[390,-395],[369,-212],[143,271],[90,405],[256,244],[198,-70]],[[30669,40193],[136,-402],[37,-426],[146,-250],[-88,-572],[150,-663],[109,-814],[200,81]],[[30952,19680],[-247,4],[-134,-145],[-250,-213],[-45,-552],[-118,-14],[-313,192],[-318,412],[-346,338],[-87,374],[79,346],[-140,393],[-36,1007],[119,568],[293,457],[-422,172],[265,522],[94,982],[309,-208],[145,1224],[-186,157],[-87,-738],[-175,83],[87,845],[95,1095],[127,404],[-80,576],[-22,666],[117,19],[170,954],[192,945],[118,881],[-64,885],[83,487],[-34,730],[163,721],[50,1143],[89,1227],[87,1321],[-20,967],[-58,832]],[[30452,39739],[143,151],[74,303]],[[33000,19946],[333,354],[236,-148],[167,237],[222,-266],[-83,-207],[-375,-177],[-125,207],[-236,-266],[-139,266]],[[33993,32727],[180,63],[279,-457],[103,18],[286,-379],[218,-327],[160,-402],[-122,-280],[77,-334]],[[35174,30629],[-121,-372],[-313,-328],[-205,118],[-151,-63],[-256,253],[-189,-19],[-169,327]],[[34826,35372],[54,341],[38,350],[0,325],[-100,107],[-104,-96],[-103,26],[-33,228],[-26,541],[-52,177],[-187,160],[-114,-116],[-293,113],[18,802],[-82,329]],[[33842,38659],[87,122],[-27,337],[77,259],[49,465],[-66,367],[-151,166],[-30,233],[41,342],[-533,24],[-107,688],[81,10],[-3,255],[-55,172],[-12,342],[-161,175],[-175,-6],[-115,172],[-188,117],[-109,220],[-311,98],[-302,529],[23,396],[-34,227],[29,443],[-363,-100],[-147,-222],[-243,-239],[-62,-179],[-143,-13],[-206,50]],[[30686,44109],[-157,-102],[-126,68],[18,898],[-228,-348],[-245,15],[-105,315],[-184,34],[59,254],[-155,359],[-115,532],[73,108],[0,250],[168,171],[-28,319],[71,206],[20,275],[318,402],[227,114],[37,89],[251,-28]],[[30585,48040],[125,1620],[6,256],[-43,339],[-123,215],[1,430],[156,97],[56,-61],[9,226],[-162,61],[-4,370],[541,-13],[92,203],[77,-187],[55,-349],[52,73]],[[31423,51320],[153,-312],[216,38],[54,181],[206,138],[115,97],[32,250],[198,168],[-15,124],[-235,51],[-39,372],[12,396],[-125,153],[52,55],[206,-76],[221,-148],[80,140],[200,92],[310,221],[102,225],[-37,167]],[[33129,53652],[145,26],[64,-136],[-36,-259],[96,-90],[63,-274],[-77,-209],[-44,-502],[71,-299],[20,-274],[171,-277],[137,-29],[30,116],[88,25],[126,104],[90,157],[154,-50],[67,21]],[[34294,51702],[151,-48],[25,120],[-46,118],[28,171],[112,-53],[131,61],[159,-125]],[[34854,51946],[121,-122],[86,160],[62,-25],[38,-166],[133,42],[107,224],[85,436],[164,540]],[[35650,53035],[95,28],[69,-327],[155,-1033],[149,-97],[7,-408],[-208,-487],[86,-178],[491,-92],[10,-593],[211,388],[349,-212],[462,-361],[135,-346],[-45,-327],[323,182],[540,-313],[415,23],[411,-489],[355,-662],[214,-170],[237,-24],[101,-186],[94,-752],[46,-358],[-110,-977],[-142,-385],[-391,-822],[-177,-668],[-206,-513],[-69,-11],[-78,-435],[20,-1107],[-77,-910],[-30,-390],[-88,-233],[-49,-790],[-282,-771],[-47,-610],[-225,-256],[-65,-355],[-302,2],[-437,-227],[-195,-263],[-311,-173],[-327,-470],[-235,-586],[-41,-441],[46,-326],[-51,-597],[-63,-289],[-195,-325],[-308,-1040],[-244,-468],[-189,-277],[-127,-562],[-183,-337]],[[33842,38659],[-4,182],[-259,302],[-258,9],[-484,-172],[-133,-520],[-7,-318],[-110,-708]],[[30669,40193],[175,638],[-119,496],[63,199],[-49,219],[108,295],[6,503],[13,415],[60,200],[-240,951]],[[30452,39739],[-279,340],[-24,242],[-551,593],[-498,646],[-214,365],[-115,488],[46,170],[-236,775],[-274,1090],[-262,1177],[-114,269],[-87,435],[-216,386],[-198,239],[90,264],[-134,563],[86,414],[221,373]],[[27693,48568],[33,-246],[-79,-141],[8,-216],[114,47],[113,-64],[116,-298],[157,243],[53,398],[170,514],[334,233],[303,619],[86,384],[-38,449]],[[29063,50490],[74,56],[184,-280],[89,-279],[129,-152],[163,-620],[207,-74],[153,157],[101,-103],[166,51],[213,-276],[-179,-602],[83,-14],[139,-314]],[[29063,50490],[-119,140],[-137,195],[-79,-94],[-235,82],[-68,255],[-52,-10],[-278,338]],[[28095,51396],[-37,183],[103,44],[-12,296],[65,214],[138,40],[117,371],[106,310],[-102,141],[52,343],[-62,540],[59,155],[-44,500],[-112,315]],[[28366,54848],[36,287],[89,-43],[52,176],[-64,348],[34,86]],[[28513,55702],[143,-18],[209,412],[114,63],[3,195],[51,500],[159,274],[175,11],[22,123],[218,-49],[218,298],[109,132],[134,285],[98,-36],[73,-156],[-54,-199]],[[30185,57537],[-178,-99],[-71,-295],[-107,-169],[-81,-220],[-34,-422],[-77,-345],[144,-40],[35,-271],[62,-130],[21,-238],[-33,-219],[10,-123],[69,-49],[66,-207],[357,57],[161,-75],[196,-508],[112,63],[200,-32],[158,68],[99,-102],[-50,-318],[-62,-199],[-22,-423],[56,-393],[79,-175],[9,-133],[-140,-294],[100,-130],[74,-207],[85,-589]],[[30185,57537],[-8,-139],[-163,-69],[91,-268],[-3,-309],[-123,-344],[105,-468],[120,38],[62,427],[-86,208],[-14,447],[346,241],[-38,278],[97,186],[100,-415],[195,-9],[180,-330],[11,-195],[249,-6],[297,61],[159,-264],[213,-74],[155,185],[4,149],[344,35],[333,9],[-236,-175],[95,-279],[222,-44],[210,-291],[45,-473],[144,13],[109,-139]],[[33400,55523],[-220,-347],[-24,-215],[95,-220],[-69,-110],[-171,-95],[5,-273],[-75,-163],[188,-448]],[[33400,55523],[183,-217],[171,-385],[8,-304],[105,-14],[149,-289],[109,-205]],[[34125,54109],[-44,-532],[-169,-154],[15,-139],[-51,-305],[123,-429],[89,-1],[37,-333],[169,-514]],[[34125,54109],[333,-119],[30,107],[225,43],[298,-159]],[[35011,53981],[-144,-508],[22,-404],[109,-351],[-49,-254],[-24,-270],[-71,-248]],[[27693,48568],[148,442],[-60,258],[-106,-275],[-166,259],[56,167],[-47,536],[97,89],[52,368],[105,381],[-20,241],[153,126],[190,236]]]};
    const all=topojson.feature(GEO_DATA,GEO_DATA.objects.countries);
    const features=all.features;
    const featureMap={};
    features.forEach(f=>featureMap[nid(f.id)]=f);

    g.selectAll(".region").data(features).enter().append("path")
      .attr("class","region").attr("id",d=>"r-"+nid(d.id)).attr("d",pathGen)
      .on("click",handleClick);

    function initGame(){
      const ids=Object.keys(NAMES);
      queue=shuffle([...ids]).slice(0,Math.min(TOTAL,ids.length));
      qIndex=0;score=0;triesLeft=MAX_TRIES;locked=false;qResults=[];wrongsThisQ=0;
      updateProgress();loadQuestion();
    }
    function loadQuestion(){
      triesLeft=MAX_TRIES;locked=false;wrongsThisQ=0;resetHearts();
      setQuestion(NAMES[currentTarget()]);
      setFeedback("","— Clique sur le bon pays —");
      updateProgress();
    }
    function handleClick(event,d){
      if(locked)return;
      const id=nid(d.id);
      const el=d3.select("#r-"+id);
      if(el.classed("correct")||el.classed("done")||el.classed("revealed"))return;
      const name=NAMES[id]||d.properties?.name||"?";
      if(id===currentTarget()){
        el.classed("correct",true);
        addLabel(id,name,"#2ecc8a");
        qResults.push({name,found:true,tries:wrongsThisQ+1});
        score++;locked=true;
        setFeedback("correct","✓ "+name);
        setTimeout(nextQuestion,1200);
      } else {
        if(el.classed("wrong"))return;
        el.classed("wrong",true);
        addLabel(id,name,"#e05555");
        triesLeft--;wrongsThisQ++;loseHeart();
        setFeedback("wrong","✗ Ici : "+name);
        if(triesLeft<=0){
          locked=true;
          const tid=currentTarget();const tname=NAMES[tid];
          qResults.push({name:tname,found:false,tries:3});
          d3.select("#r-"+tid).classed("revealed",true);
          addLabel(tid,tname+" ✓","#2ecc8a");
          setFeedback("skip","→ "+tname);
          setTimeout(nextQuestion,2000);
        }
      }
    }
    function addLabel(id,text,color){
      const feat=featureMap[id];if(!feat)return;
      const[cx,cy]=pathGen.centroid(feat);
      if(!isFinite(cx)||!isFinite(cy))return;
      labelsG.append("text").attr("class","region-label").attr("x",cx).attr("y",cy).attr("fill",color).text(text);
    }
    function nextQuestion(){
      labelsG.selectAll("*").remove();
      d3.select("#r-"+currentTarget()).classed("correct",false).classed("revealed",false).classed("done",true);
      qIndex++;
      if(qIndex>=queue.length)finishGame();else loadQuestion();
    }
    function finishGame(){
      document.getElementById("progress-bar").style.width="100%";
      document.getElementById("progress-label").textContent="Terminé";
      document.getElementById("score-label").textContent="✓ "+score;
      const entry={date:new Date().toLocaleDateString("fr-FR"),results:qResults,score,total:queue.length};
      const key="scores_"+QUIZ_ID;
      const hist=JSON.parse(localStorage.getItem(key)||"[]");
      hist.unshift(entry);if(hist.length>20)hist.pop();
      localStorage.setItem(key,JSON.stringify(hist));
      const pct=score/queue.length;
      const emoji=pct===1?"◆◆◆":pct>=.7?"◆◆":"◆";
      const sub=pct===1?"Perfect score — flawless execution.":pct>=.7?"Strong performance.":pct>=.4?"Room to improve.":"Keep grinding.";
      document.getElementById("res-emoji").textContent=emoji;
      document.getElementById("res-score").textContent=score+" / "+queue.length;
      document.getElementById("res-sub").textContent=sub;
      document.getElementById("res-detail").innerHTML=qResults.map(r=>{
        const label=r.found?(r.tries===1?" · 1st try":" · "+r.tries+" tries"):" · missed";
        return "<div class=\"rdi "+(r.found?"ok":"miss")+"\">"+(r.found?"✓":"✗")+" "+r.name+label+"</div>";
      }).join("");
      downloadTxt(entry);
      document.getElementById("overlay").classList.add("visible");
    }
    function downloadTxt(entry){
      const lines=["Quiz — "+QUIZ_TITLE,"Date: "+entry.date,"Score: "+entry.score+" / "+entry.total,"","Detail:"];
      entry.results.forEach(r=>{
        lines.push("  "+r.name+" : "+(r.found?(r.tries===1?"✓ 1st try":"✓ "+r.tries+" tries"):"✗ missed"));
      });
      const hist=JSON.parse(localStorage.getItem("scores_"+QUIZ_ID)||"[]");
      if(hist.length>1){lines.push("","--- History ---");hist.slice(1).forEach(h=>lines.push("  "+h.date+" : "+h.score+"/"+h.total));}
      const blob=new Blob([lines.join("\n")],{type:"text/plain;charset=utf-8"});
      const a=document.createElement("a");a.href=URL.createObjectURL(blob);
      a.download="score_"+QUIZ_ID+"_"+entry.date.replace(/\//g,"-")+".txt";
      document.body.appendChild(a);a.click();document.body.removeChild(a);
    }
    initGame();
  </script>
</body>
